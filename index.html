<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#070712" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Holo Card" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Holo Card Viewer - GitHub Pages</title>
  <style>
:root {
  --bg: #070711;
  --panel: rgba(255, 255, 255, 0.075);
  --panel-strong: rgba(255, 255, 255, 0.12);
  --line: rgba(255, 255, 255, 0.18);
  --text: #f4f7ff;
  --muted: rgba(244, 247, 255, 0.68);
  --soft: rgba(244, 247, 255, 0.48);
  --accent: #c9f2ff;
  --shadow: 0 28px 80px rgba(0, 0, 0, 0.46);
  --radius-lg: 28px;
  --radius-md: 18px;
  --rx: 0deg;
  --ry: 0deg;
  --light-x: 50%;
  --light-y: 50%;
  --shift-x: 50%;
  --shift-y: 50%;
  --curve-x: 50%;
  --curve-y: 50%;
  --angle: 132deg;
  --foil-opacity: 0.32;
  --sheen-opacity: 0.30;
  --texture-opacity: 0.25;
  --sparkle-opacity: 0.20;
  --highlight-core: 0.36;
  --highlight-glow: 0.15;
  --rim-opacity: 0.16;
  --rim-x: 0px;
  --rim-y: 0px;
  --particle-x: 0px;
  --particle-y: 0px;
  --ambient-x: 50%;
  --ambient-y: 50%;
  --ambient-angle: 0deg;
  --ambient-opacity: 0.16;
  --ambient-particle-x: 0px;
  --ambient-particle-y: 0px;
  --card-aspect-ratio: 630 / 880;
  --card-ratio: 0.715909;
  --image-mask: linear-gradient(#fff, #fff);
  --fullscreen-card-width: calc(min(100vw, calc(100dvh * var(--card-ratio))) * 1.08);
  --fullscreen-card-height: calc(min(100dvh, calc(100vw / var(--card-ratio))) * 1.08);
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(88, 74, 255, 0.24), transparent 34rem),
    radial-gradient(circle at bottom right, rgba(255, 71, 171, 0.18), transparent 32rem),
    linear-gradient(135deg, #05050c, #0a0a16 48%, #040409);
}

body.viewer-open {
  overflow: hidden;
}

body.is-mobile-performance .panel {
  backdrop-filter: none;
}

body.is-mobile-performance .holo-card {
  filter: drop-shadow(0 18px 32px rgba(0, 0, 0, 0.38));
}

button,
select,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.app {
  width: min(1120px, calc(100% - 32px));
  min-height: 100dvh;
  margin: 0 auto;
  padding: clamp(28px, 6dvh, 72px) 0;
  display: grid;
  grid-template-columns: minmax(0, 1.06fr) minmax(280px, 420px);
  gap: clamp(24px, 6vw, 72px);
  align-items: center;
}

.panel {
  padding: clamp(24px, 4vw, 42px);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.055)),
    rgba(5, 6, 16, 0.72);
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px);
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--accent);
  font-size: 0.76rem;
  font-weight: 700;
  letter-spacing: 0.17em;
  text-transform: uppercase;
}

h1 {
  margin: 0;
  font-size: clamp(2.35rem, 8vw, 5.6rem);
  line-height: 0.9;
  letter-spacing: -0.08em;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.drop-zone {
  min-height: 132px;
  display: grid;
  gap: 6px;
  place-items: center;
  padding: 22px;
  border: 1px dashed rgba(255, 255, 255, 0.34);
  border-radius: 22px;
  background:
    radial-gradient(circle at 50% 0%, rgba(201, 242, 255, 0.14), transparent 60%),
    rgba(255, 255, 255, 0.045);
  color: var(--text);
  text-align: center;
  transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
}

.drop-zone:hover,
.drop-zone.is-dragover {
  border-color: rgba(201, 242, 255, 0.88);
  background:
    radial-gradient(circle at 50% 0%, rgba(201, 242, 255, 0.24), transparent 62%),
    rgba(255, 255, 255, 0.07);
  transform: translateY(-1px);
}

.drop-zone__mark {
  width: 44px;
  height: 44px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 999px;
  color: var(--accent);
  background: rgba(0, 0, 0, 0.2);
}

.drop-zone__title {
  font-weight: 750;
}

.drop-zone__meta {
  max-width: 56ch;
  color: var(--soft);
  font-size: 0.87rem;
  line-height: 1.55;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 18px;
}

.field {
  display: grid;
  gap: 8px;
  color: var(--muted);
  font-size: 0.86rem;
}

.field > span {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

select,
input[type="range"] {
  width: 100%;
}

select {
  min-height: 46px;
  padding: 0 42px 0 14px;
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 14px;
  color: var(--text);
  background: rgba(10, 11, 24, 0.92);
}

input[type="range"] {
  accent-color: var(--accent);
}

.range-field {
  padding: 14px;
  border: 1px solid rgba(255, 255, 255, 0.11);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.04);
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 22px;
}

.primary-button,
.ghost-button,
.toolbar-button {
  min-height: 48px;
  border: 0;
  border-radius: 999px;
  padding: 0 18px;
  font-weight: 760;
  background: rgba(255, 255, 255, 0.13);
}

.primary-button {
  color: #041017;
  background: linear-gradient(135deg, #fbffff, #bff4ff 42%, #ffd4f0);
  box-shadow: 0 12px 32px rgba(122, 235, 255, 0.2);
}

.ghost-button,
.toolbar-button {
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: rgba(255, 255, 255, 0.08);
}

.preview-area {
  display: grid;
  justify-items: center;
  gap: 16px;
}

.preview-shell {
  width: min(100%, 620px);
  perspective: 1200px;
}

.holo-card {
  position: relative;
  isolation: isolate;
  width: min(100%, calc(72dvh * var(--card-ratio)));
  max-height: 72dvh;
  aspect-ratio: var(--card-aspect-ratio);
  overflow: hidden;
  border-radius: 0;
  background: transparent;
  filter: drop-shadow(0 28px 52px rgba(0, 0, 0, 0.42));
  transform: perspective(1100px) rotateX(var(--rx)) rotateY(var(--ry)) translateZ(0);
  transform-style: preserve-3d;
  transition: filter 180ms ease;
  will-change: transform;
}

.holo-card::before,
.holo-card::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  -webkit-mask-image: var(--image-mask);
  mask-image: var(--image-mask);
  -webkit-mask-position: center;
  mask-position: center;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-size: 100% 100%;
  mask-size: 100% 100%;
}

.holo-card::before {
  z-index: 6;
  background:
    radial-gradient(ellipse 28% 18% at var(--light-x) var(--light-y), rgba(255, 255, 255, var(--highlight-core)) 0 6%, rgba(255, 255, 255, var(--highlight-glow)) 18%, transparent 54%),
    radial-gradient(ellipse 86% 64% at var(--curve-x) var(--curve-y), rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.04) 28%, transparent 62%),
    linear-gradient(calc(var(--angle) + 90deg), transparent 0 20%, rgba(255, 255, 255, 0.12) 42%, transparent 72%);
  mix-blend-mode: screen;
  opacity: var(--sheen-opacity);
  transform: translateZ(18px);
}

.holo-card::after {
  z-index: 8;
  box-shadow:
    inset var(--rim-x) var(--rim-y) 18px rgba(255, 255, 255, var(--rim-opacity)),
    inset 0 0 1px 1px rgba(255, 255, 255, 0.28),
    inset 0 0 14px rgba(255, 255, 255, 0.08);
}

.card-image {
  position: absolute;
  inset: 0;
  z-index: 1;
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: transparent;
  transform: translateZ(1px) scale(1.002);
  user-select: none;
  -webkit-user-drag: none;
}

.holo-card.is-cover .card-image {
  object-fit: cover;
}

.foil {
  position: absolute;
  inset: 0;
  pointer-events: none;
  -webkit-mask-image: var(--image-mask);
  mask-image: var(--image-mask);
  -webkit-mask-position: center;
  mask-position: center;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-size: 100% 100%;
  mask-size: 100% 100%;
  will-change: background-position, opacity, filter;
}

.foil-base {
  z-index: 2;
  opacity: var(--foil-opacity);
  mix-blend-mode: overlay;
}

.foil-sheen {
  z-index: 3;
  opacity: var(--sheen-opacity);
  mix-blend-mode: screen;
}

.foil-texture {
  z-index: 4;
  opacity: var(--texture-opacity);
  mix-blend-mode: soft-light;
  animation: idleDrift 8s ease-in-out infinite alternate;
}

.foil-sparkles {
  z-index: 5;
  opacity: var(--sparkle-opacity);
  mix-blend-mode: screen;
  transform: translate3d(var(--particle-x), var(--particle-y), 14px);
  animation: particleDrift 2600ms ease-in-out infinite alternate;
}

.viewer .foil::after {
  content: "";
  position: absolute;
  inset: -8%;
  pointer-events: none;
  transform: translate3d(var(--ambient-particle-x), var(--ambient-particle-y), 18px) rotate(var(--ambient-angle));
  transform-origin: center;
  will-change: background-position, opacity, transform;
}

.viewer .foil-base::after {
  background:
    conic-gradient(from var(--ambient-angle) at var(--ambient-x) var(--ambient-y), rgba(255, 255, 255, 0.2), rgba(64, 226, 255, 0.18), rgba(255, 74, 188, 0.16), rgba(255, 244, 128, 0.14), rgba(255, 255, 255, 0.2));
  background-size: 160% 160%;
  background-position: var(--shift-x) var(--shift-y);
  mix-blend-mode: soft-light;
  opacity: calc(var(--ambient-opacity) * 0.9);
  animation: ambientFoilFlow 6.5s ease-in-out infinite alternate;
}

.viewer .foil-sheen::after {
  background:
    linear-gradient(calc(var(--ambient-angle) + 28deg), transparent 0 31%, rgba(255, 255, 255, 0.18) 43%, transparent 58% 100%),
    radial-gradient(ellipse 32% 22% at var(--ambient-x) var(--ambient-y), rgba(255, 255, 255, 0.2), transparent 64%);
  background-size: 230% 230%, 100% 100%;
  background-position: var(--shift-y) var(--shift-x), center;
  mix-blend-mode: screen;
  opacity: var(--ambient-opacity);
  animation: ambientSheenSweep 5.2s ease-in-out infinite alternate;
}

.viewer .foil-texture::after {
  background:
    repeating-linear-gradient(calc(var(--ambient-angle) + 65deg), rgba(255, 255, 255, 0.12) 0 1px, transparent 1px 12px),
    repeating-linear-gradient(calc(var(--ambient-angle) - 35deg), transparent 0 18px, rgba(255, 255, 255, 0.08) 19px 20px, transparent 21px 36px);
  background-position: var(--shift-x) var(--shift-y), var(--shift-y) var(--shift-x);
  mix-blend-mode: soft-light;
  opacity: calc(var(--ambient-opacity) * 0.75);
  animation: ambientTextureDrift 7.4s ease-in-out infinite alternate;
}

.viewer .foil-sparkles::after {
  background:
    radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.68) 0 1px, transparent 2px),
    radial-gradient(circle at 72% 34%, rgba(255, 255, 255, 0.52) 0 1px, transparent 2.2px),
    radial-gradient(circle at 44% 76%, rgba(255, 255, 255, 0.58) 0 1.2px, transparent 2.4px);
  background-size: 88px 104px, 126px 112px, 72px 92px;
  background-position:
    var(--shift-x) var(--shift-y),
    var(--shift-y) var(--shift-x),
    var(--ambient-x) var(--ambient-y);
  mix-blend-mode: screen;
  opacity: calc(var(--ambient-opacity) * 1.35);
  animation: ambientParticleTwinkle 1800ms ease-in-out infinite alternate;
}

.effect-rainbow .foil-base {
  background:
    conic-gradient(from var(--angle) at var(--light-x) var(--light-y), #ff008c, #ffcf33, #43ff75, #30d6ff, #7658ff, #ff008c),
    linear-gradient(calc(var(--angle) + 28deg), transparent 0 28%, rgba(255, 255, 255, 0.86) 43%, transparent 58% 100%);
  background-size: 220% 220%, 180% 180%;
  background-position: var(--shift-x) var(--shift-y), var(--shift-y) var(--shift-x);
  filter: saturate(1.5) contrast(1.08);
}

.effect-rainbow .foil-sheen {
  background:
    linear-gradient(calc(var(--angle) - 14deg), transparent 20%, rgba(255, 255, 255, 0.72) 45%, rgba(255, 255, 255, 0.12) 51%, transparent 70%),
    radial-gradient(circle at var(--light-x) var(--light-y), rgba(255, 255, 255, 0.88), transparent 30%);
  background-size: 220% 220%, 100% 100%;
  background-position: var(--shift-x) var(--shift-y), center;
}

.effect-rainbow .foil-texture {
  background:
    repeating-linear-gradient(112deg, rgba(255, 255, 255, 0.24) 0 1px, transparent 1px 8px),
    repeating-linear-gradient(28deg, rgba(255, 255, 255, 0.12) 0 1px, transparent 1px 13px);
  background-position: var(--shift-y) var(--shift-x);
}

.effect-glitter .foil-base {
  background:
    radial-gradient(circle at var(--light-x) var(--light-y), rgba(255, 255, 255, 0.98), transparent 20%),
    linear-gradient(120deg, rgba(0, 229, 255, 0.12), rgba(255, 0, 142, 0.46), rgba(255, 225, 0, 0.18), rgba(108, 255, 170, 0.36));
  background-size: 100% 100%, 180% 180%;
  background-position: center, var(--shift-x) var(--shift-y);
  filter: saturate(1.35);
}

.effect-glitter .foil-sheen {
  background: linear-gradient(calc(var(--angle) + 12deg), transparent 22%, rgba(255, 255, 255, 0.8) 47%, transparent 62%);
  background-size: 260% 260%;
  background-position: var(--shift-x) var(--shift-y);
}

.effect-glitter .foil-texture,
.effect-glitter .foil-sparkles {
  background:
    radial-gradient(circle at 12% 17%, rgba(255, 255, 255, 0.95) 0 1px, transparent 2px),
    radial-gradient(circle at 72% 28%, rgba(255, 255, 255, 0.82) 0 1.5px, transparent 2.5px),
    radial-gradient(circle at 34% 64%, rgba(255, 255, 255, 0.72) 0 1px, transparent 2px),
    radial-gradient(circle at 86% 76%, rgba(255, 255, 255, 0.95) 0 1.2px, transparent 2.4px),
    radial-gradient(circle at 52% 42%, rgba(255, 255, 255, 0.84) 0 0.9px, transparent 2px);
  background-size: 96px 124px, 122px 100px, 84px 110px, 116px 130px, 72px 94px;
  background-position:
    var(--shift-x) var(--shift-y),
    var(--shift-y) var(--shift-x),
    30% 70%,
    80% 20%,
    50% 50%;
  animation: glitterJitter 900ms steps(2, end) infinite;
}

.effect-prism .foil-base {
  background:
    repeating-conic-gradient(from var(--angle) at var(--light-x) var(--light-y),
      rgba(255, 0, 170, 0.08) 0deg 8deg,
      rgba(255, 255, 255, 0.72) 9deg 11deg,
      rgba(0, 224, 255, 0.14) 12deg 20deg,
      rgba(255, 244, 0, 0.42) 21deg 25deg,
      rgba(104, 64, 255, 0.16) 26deg 36deg);
  background-size: 180% 180%;
  background-position: var(--shift-x) var(--shift-y);
  filter: contrast(1.12) saturate(1.6);
}

.effect-prism .foil-sheen {
  background:
    linear-gradient(64deg, transparent 0 20%, rgba(255, 255, 255, 0.54) 21% 22%, transparent 23% 46%, rgba(255, 255, 255, 0.28) 47% 48%, transparent 49% 100%),
    linear-gradient(146deg, transparent 0 34%, rgba(255, 255, 255, 0.72) 35% 37%, transparent 38% 100%);
  background-size: 132px 142px, 190px 178px;
  background-position: var(--shift-x) var(--shift-y), var(--shift-y) var(--shift-x);
}

.effect-prism .foil-texture {
  background:
    linear-gradient(30deg, rgba(255, 255, 255, 0.18) 0 1px, transparent 1px 22px),
    linear-gradient(150deg, rgba(255, 255, 255, 0.13) 0 1px, transparent 1px 26px);
  background-size: 74px 74px;
  background-position: var(--shift-x) var(--shift-y);
}

.effect-scan .foil-base {
  background:
    linear-gradient(var(--angle), transparent 4%, rgba(255, 255, 255, 0.94) 44%, rgba(255, 255, 255, 0.18) 50%, transparent 63%),
    linear-gradient(90deg, rgba(255, 0, 145, 0.5), rgba(0, 238, 255, 0.55), rgba(255, 244, 80, 0.48), rgba(255, 0, 145, 0.5));
  background-size: 260% 260%, 200% 100%;
  background-position: var(--shift-x) var(--shift-y), var(--shift-y) center;
  filter: saturate(1.45);
}

.effect-scan .foil-sheen {
  background:
    repeating-linear-gradient(calc(var(--angle) + 78deg), rgba(255, 255, 255, 0.24) 0 1px, transparent 1px 7px),
    linear-gradient(calc(var(--angle) - 12deg), transparent 0 36%, rgba(255, 255, 255, 0.72) 46%, transparent 58% 100%);
  background-size: 100% 100%, 240% 240%;
  background-position: center, var(--shift-x) var(--shift-y);
}

.effect-scan .foil-texture {
  background:
    repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.14) 0 1px, transparent 1px 5px),
    repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 11px);
}

.effect-aurora .foil-base {
  background:
    radial-gradient(ellipse at var(--light-x) var(--light-y), rgba(255, 255, 255, 0.8), transparent 22%),
    radial-gradient(ellipse at 15% 20%, rgba(0, 255, 190, 0.52), transparent 42%),
    radial-gradient(ellipse at 85% 32%, rgba(255, 66, 210, 0.48), transparent 42%),
    radial-gradient(ellipse at 46% 82%, rgba(94, 120, 255, 0.58), transparent 44%),
    linear-gradient(135deg, rgba(255, 245, 130, 0.26), rgba(0, 238, 255, 0.18), rgba(255, 0, 170, 0.22));
  background-size: 100% 100%, 160% 160%, 170% 140%, 150% 180%, 180% 180%;
  background-position: center, var(--shift-x) var(--shift-y), var(--shift-y) var(--shift-x), 50% 80%, var(--shift-x) var(--shift-y);
  animation: auroraFloat 7s ease-in-out infinite alternate;
  filter: blur(0.2px) saturate(1.42);
}

.effect-aurora .foil-sheen {
  background:
    linear-gradient(calc(var(--angle) + 24deg), transparent 15%, rgba(255, 255, 255, 0.42) 34%, transparent 52%),
    radial-gradient(circle at var(--light-x) var(--light-y), rgba(255, 255, 255, 0.7), transparent 32%);
  background-size: 220% 220%, 100% 100%;
  background-position: var(--shift-x) var(--shift-y), center;
}

.effect-aurora .foil-texture {
  background: repeating-linear-gradient(120deg, rgba(255, 255, 255, 0.11) 0 1px, transparent 1px 16px);
  background-position: var(--shift-y) var(--shift-x);
}

.effect-secret .foil-base {
  background:
    repeating-linear-gradient(38deg, transparent 0 12px, rgba(255, 255, 255, 0.62) 13px 15px, transparent 16px 34px),
    conic-gradient(from var(--angle) at var(--light-x) var(--light-y), rgba(255, 0, 160, 0.52), rgba(255, 238, 82, 0.44), rgba(0, 238, 255, 0.46), rgba(132, 92, 255, 0.5), rgba(255, 0, 160, 0.52));
  background-size: 126px 126px, 190% 190%;
  background-position: var(--shift-x) var(--shift-y), var(--shift-y) var(--shift-x);
  filter: contrast(1.24) saturate(1.75);
}

.effect-secret .foil-sheen {
  background:
    linear-gradient(calc(var(--angle) + 22deg), transparent 0 32%, rgba(255, 255, 255, 0.9) 44%, rgba(255, 255, 255, 0.08) 50%, transparent 64% 100%),
    repeating-linear-gradient(128deg, transparent 0 24px, rgba(255, 255, 255, 0.42) 25px 26px, transparent 27px 58px);
  background-size: 240% 240%, 160px 160px;
  background-position: var(--shift-x) var(--shift-y), var(--shift-y) var(--shift-x);
}

.effect-secret .foil-texture,
.effect-secret .foil-sparkles {
  background:
    radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.98) 0 1px, transparent 2px),
    radial-gradient(circle at 44% 62%, rgba(255, 255, 255, 0.86) 0 1.4px, transparent 2.6px),
    radial-gradient(circle at 78% 36%, rgba(255, 255, 255, 0.92) 0 1px, transparent 2px),
    radial-gradient(circle at 66% 82%, rgba(255, 255, 255, 0.8) 0 1.2px, transparent 2.5px);
  background-size: 82px 94px, 118px 132px, 96px 108px, 142px 124px;
  background-position:
    var(--shift-x) var(--shift-y),
    var(--shift-y) var(--shift-x),
    70% 30%,
    30% 80%;
}

.effect-cosmos .foil-base {
  background:
    radial-gradient(circle at var(--light-x) var(--light-y), rgba(255, 255, 255, 0.86), transparent 22%),

<body>
  <main class="app" aria-labelledby="app-title">
    <section class="panel">

  <script>
(() => {
  'use strict';

  const $ = (selector) => document.querySelector(selector);

  const imageInput = $('#imageInput');
  const dropZone = $('#dropZone');
  const fileName = $('#fileName');
  const effectSelect = $('#effectSelect');
  const fitSelect = $('#fitSelect');
  const strengthRange = $('#strengthRange');
  const strengthValue = $('#strengthValue');
  const tiltRange = $('#tiltRange');
  const tiltValue = $('#tiltValue');
  const startButton = $('#startButton');
  const resetButton = $('#resetButton');
  const status = $('#status');

  const previewCard = $('#previewCard');
  const previewImage = $('#previewImage');
  const fullCard = $('#fullCard');
  const fullImage = $('#fullImage');
  const viewer = $('#viewer');
  const viewerStage = $('#viewerStage');
  const exitButton = $('#exitButton');
  const recalibrateButton = $('#recalibrateButton');
  const liveMode = $('#liveMode');

  const effectClasses = [
    'effect-rainbow',
    'effect-glitter',
    'effect-prism',
    'effect-scan',
    'effect-aurora',
    'effect-secret',
    'effect-cosmos',
    'effect-parallel',
    'effect-reverse',
  ];
  const cards = [previewCard, fullCard];
  const images = [previewImage, fullImage];
  const MAX_DISPLAY_IMAGE_EDGE = 1800;
  const DISPLAY_IMAGE_QUALITY = 0.86;
  const FULLSCREEN_BLEED_SCALE = 1.08;
  const MOBILE_RENDER_FRAME_INTERVAL = 1000 / 30;
  const DESKTOP_RENDER_FRAME_INTERVAL = 1000 / 60;
  const mobilePerformanceQuery = window.matchMedia?.('(pointer: coarse), (max-width: 760px)');

  const sampleSvg = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 880">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#19203d" />
        <stop offset="0.48" stop-color="#32124b" />
        <stop offset="1" stop-color="#070a16" />
      </linearGradient>
      <radialGradient id="orb" cx="48%" cy="35%" r="42%">
        <stop offset="0" stop-color="#faffff" stop-opacity="0.92" />
        <stop offset="0.18" stop-color="#8ff4ff" stop-opacity="0.62" />
        <stop offset="0.62" stop-color="#843dff" stop-opacity="0.16" />
        <stop offset="1" stop-color="#000000" stop-opacity="0" />
      </radialGradient>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000" flood-opacity="0.5" />
      </filter>
    </defs>
    <rect width="630" height="880" rx="46" fill="url(#bg)" />
    <rect x="36" y="36" width="558" height="808" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="4" />
    <rect x="58" y="58" width="514" height="600" rx="28" fill="#07101f" stroke="#ffffff" stroke-opacity="0.18" />
    <circle cx="315" cy="322" r="238" fill="url(#orb)" />
    <path d="M186 528 C214 405 274 276 323 164 C365 283 422 404 455 528 C377 492 271 494 186 528Z" fill="#faffff" fill-opacity="0.82" filter="url(#softShadow)" />
    <path d="M235 503 C262 397 292 316 323 237 C354 317 386 398 416 503 C357 482 292 482 235 503Z" fill="#11162a" fill-opacity="0.78" />
    <path d="M315 174 L331 223 L383 224 L341 254 L357 304 L315 273 L273 304 L289 254 L247 224 L299 223Z" fill="#ffedf9" fill-opacity="0.9" />
    <text x="315" y="728" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="76" font-weight="800" letter-spacing="6" fill="#f5f7ff">HOLO</text>
    <text x="315" y="780" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="600" letter-spacing="5" fill="#c9f2ff" fill-opacity="0.86">CARD VIEWER</text>
  </svg>`;

  const sampleUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(sampleSvg)}`;

  let currentObjectUrl = '';
  let active = false;
  let rafId = 0;
  let previewRafId = 0;
  let sensorBound = false;
  let baseline = null;
  let lastOrientationAt = 0;
  let lastPointerAt = 0;
  let lastPreviewPointerAt = 0;
  let orientationDetected = false;
  let fullscreenCloseInProgress = false;
  let imageLoadToken = 0;

  const target = { x: 0, y: 0, sparkle: 0 };
  const current = { x: 0, y: 0, sparkle: 0 };
  const previewIdleCurrent = { x: 0, y: 0, sparkle: 0 };

  const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
  const lerp = (from, to, amount) => from + (to - from) * amount;

  function toCssUrl(url) {
    return `url("${url.replace(/["\\]/g, '\\$&')}")`;
  }

  function applyImageMaskUrl(url) {
    const mask = toCssUrl(url);
    cards.forEach((card) => {
      card.style.setProperty('--image-mask', mask);
    });
  }

  function applyImageLayout(width, height) {
    if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) return;

    const ratio = width / height;
    cards.forEach((card) => {
      card.style.setProperty('--card-aspect-ratio', `${width} / ${height}`);
      card.style.setProperty('--card-ratio', ratio.toFixed(6));
    });
    syncFullscreenFit();
  }

  function syncImageLayoutFromImage(image) {
    applyImageLayout(image.naturalWidth, image.naturalHeight);
  }

  function selectFullscreenFit(viewportWidth, viewportHeight, cardRatio) {
    const widthFitHeight = viewportWidth / cardRatio;
    const heightFitWidth = viewportHeight * cardRatio;

    if (widthFitHeight <= viewportHeight) {
      return {
        axis: 'width',
        width: viewportWidth,
        height: widthFitHeight,
      };
    }

    return {
      axis: 'height',
      width: heightFitWidth,
      height: viewportHeight,
    };
  }

  function syncFullscreenFit() {
    const viewport = window.visualViewport;
    const viewportWidth = Math.max(1, (viewport ? viewport.width : window.innerWidth) - 16);
    const viewportHeight = Math.max(1, (viewport ? viewport.height : window.innerHeight) - 16);
    const cardRatio = Number.parseFloat(getComputedStyle(fullCard).getPropertyValue('--card-ratio')) || 630 / 880;
    const fit = selectFullscreenFit(viewportWidth, viewportHeight, cardRatio);

    viewer.style.setProperty('--fullscreen-card-width', `${(fit.width * FULLSCREEN_BLEED_SCALE).toFixed(2)}px`);
    viewer.style.setProperty('--fullscreen-card-height', `${(fit.height * FULLSCREEN_BLEED_SCALE).toFixed(2)}px`);
    viewer.dataset.fitAxis = fit.axis;
  }

  function setStatus(message) {
    status.textContent = message;
  }

  function setLiveMode(message) {
    liveMode.textContent = message;
  }

  function loadImageUrl(url) {
    applyImageMaskUrl(url);
    images.forEach((image) => {
      image.src = url;
      if (image.complete) {
        syncImageLayoutFromImage(image);
      }
    });
  }

  function revokeCurrentObjectUrl() {
    if (currentObjectUrl) {
      URL.revokeObjectURL(currentObjectUrl);
      currentObjectUrl = '';
    }
  }

  function shouldResizeRasterFile(file) {
    return ['image/jpeg', 'image/png', 'image/webp'].includes(file.type);
  }

  async function createDisplayImageUrl(file) {
    if (!shouldResizeRasterFile(file) || typeof createImageBitmap !== 'function') {
      return URL.createObjectURL(file);
    }

    let bitmap;

    try {
      bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' });
    } catch (error) {
      try {
        bitmap = await createImageBitmap(file);
      } catch (fallbackError) {
        console.warn('Image decode optimization failed:', fallbackError);
        return URL.createObjectURL(file);
      }
    }

    const sourceEdge = Math.max(bitmap.width, bitmap.height);

    if (sourceEdge <= MAX_DISPLAY_IMAGE_EDGE) {
      bitmap.close?.();
      return URL.createObjectURL(file);
    }

    const scale = MAX_DISPLAY_IMAGE_EDGE / sourceEdge;
    const width = Math.max(1, Math.round(bitmap.width * scale));
    const height = Math.max(1, Math.round(bitmap.height * scale));
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d', { alpha: file.type === 'image/png' });

    if (!context) {
      bitmap.close?.();
      return URL.createObjectURL(file);
    }

    canvas.width = width;
    canvas.height = height;
    context.imageSmoothingEnabled = true;
    context.imageSmoothingQuality = 'high';
    context.drawImage(bitmap, 0, 0, width, height);
    bitmap.close?.();

    const outputType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
    const blob = await new Promise((resolve) => {
      canvas.toBlob(resolve, outputType, DISPLAY_IMAGE_QUALITY);
    });

    return URL.createObjectURL(blob || file);
  }

  async function loadFile(file) {
    if (!file) return;

    if (!file.type.startsWith('image/')) {
      setStatus('画像ファイルを選択してください。');
      return;
    }

    const loadToken = ++imageLoadToken;
    setStatus('画像を表示用に最適化しています。');

    let nextUrl;

    try {
      nextUrl = await createDisplayImageUrl(file);
    } catch (error) {
      console.warn('Image optimization failed:', error);
      nextUrl = URL.createObjectURL(file);
    }

    if (loadToken !== imageLoadToken) {
      URL.revokeObjectURL(nextUrl);
      return;
    }

    revokeCurrentObjectUrl();
    currentObjectUrl = nextUrl;
    loadImageUrl(nextUrl);
    fileName.textContent = `${file.name} / ${(file.size / 1024 / 1024).toFixed(2)} MB`;
    setStatus('画像を読み込みました。エフェクトを選び、実行ボタンで全画面表示できます。');
  }

  function resetToSample() {
    revokeCurrentObjectUrl();
    imageInput.value = '';
    loadImageUrl(sampleUrl);
    fileName.textContent = 'PNG / JPEG / WebP / SVG など。未選択時は内蔵サンプルを表示します。';
    setStatus('サンプル画像に戻しました。任意の画像に差し替えできます。');
  }

  function applyEffect(effectName) {
    const className = `effect-${effectName}`;
    cards.forEach((card) => {
      card.classList.remove(...effectClasses);
      card.classList.add(className);
    });
  }

  function applyFit(fitMode) {
    cards.forEach((card) => {
      card.classList.toggle('is-cover', fitMode === 'cover');
    });
  }

  function applyStrength() {
    const value = Number(strengthRange.value);
    const strength = value / 100;
    strengthValue.value = `${value}%`;

    cards.forEach((card) => {
      card.style.setProperty('--foil-opacity', (0.10 + strength * 0.42).toFixed(3));
      card.style.setProperty('--sheen-opacity', (0.10 + strength * 0.38).toFixed(3));
      card.style.setProperty('--texture-opacity', (0.06 + strength * 0.34).toFixed(3));
      card.style.setProperty('--sparkle-opacity', (0.06 + strength * 0.18).toFixed(3));
      card.style.setProperty('--highlight-core', (0.14 + strength * 0.32).toFixed(3));
      card.style.setProperty('--highlight-glow', (0.06 + strength * 0.16).toFixed(3));
      card.style.setProperty('--rim-opacity', (0.07 + strength * 0.16).toFixed(3));
    });
  }

  function updateTiltLabel() {
    tiltValue.value = `${tiltRange.value}%`;
  }

  function getMaxTiltDegrees() {
    return 4 + (Number(tiltRange.value) / 100) * 16;
  }

  function computeAmbientMotion(now, intensity = 1) {
    const seconds = now / 1000;
    const driftX = (Math.sin(seconds * 0.46) * 0.11 + Math.sin(seconds * 0.97 + 1.8) * 0.045) * intensity;
    const driftY = (Math.cos(seconds * 0.39 + 0.6) * 0.10 + Math.sin(seconds * 0.81) * 0.04) * intensity;
    const pulse = (Math.sin(seconds * 1.65) + 1) / 2;

    return {
      x: driftX,
      y: driftY,
      sparkle: (0.08 + pulse * 0.10) * intensity,
      angle: seconds * 24,
      opacity: 0.12 + pulse * 0.08,
      particleX: Math.sin(seconds * 1.18 + 0.4) * 5 * intensity,
      particleY: Math.cos(seconds * 1.04 + 1.1) * 5 * intensity,
    };
  }

  function computeSurfaceLight(x, y, sparkle = 0, ambient = {}) {
    const normalizedX = clamp(x, -1, 1);
    const normalizedY = clamp(y, -1, 1);
    const opticalX = clamp(normalizedX + Number(ambient.x || 0), -1, 1);
    const opticalY = clamp(normalizedY + Number(ambient.y || 0), -1, 1);
    const radius = clamp(Math.hypot(opticalX, opticalY), 0, 1);
    const dome = Math.sqrt(1 - Math.pow(radius * 0.68, 2));
    const curvePush = 0.78 + dome * 0.22;
    const tangentX = opticalX * curvePush - opticalY * 0.045;
    const tangentY = opticalY * curvePush + opticalX * 0.045;
    const strength = Number(strengthRange.value) / 100;
    const ambientSparkle = clamp(Number(ambient.sparkle || 0), 0, 1);
    const sparkleEnergy = clamp(sparkle + ambientSparkle, 0, 1);

    return {
      normalizedX,
      normalizedY,
      angle: Math.atan2(tangentY, tangentX) * 180 / Math.PI + 132,
      lightX: 50 + tangentX * (26 + radius * 10),
      lightY: 50 + tangentY * (24 + radius * 9),
      curveX: 50 - tangentX * (18 + dome * 10),
      curveY: 50 - tangentY * (16 + dome * 9),
      shiftX: 50 + tangentX * 34,
      shiftY: 50 + tangentY * 34,
      highlightCore: clamp(0.14 + strength * 0.32 + sparkleEnergy * 0.14, 0.12, 0.56),
      highlightGlow: clamp(0.06 + strength * 0.16 + sparkleEnergy * 0.06, 0.05, 0.26),
      rimOpacity: clamp(0.07 + strength * 0.16 + radius * 0.08, 0.06, 0.30),
      particleX: tangentX * 7 + Math.sin(sparkleEnergy * Math.PI) * 1.6,
      particleY: tangentY * 7 - Math.cos(sparkleEnergy * Math.PI) * 1.2,
      sparkleOpacity: clamp(0.06 + strength * 0.18 + sparkleEnergy * 0.36, 0.05, 0.50),
      ambientX: 50 + Number(ambient.x || 0) * 180,
      ambientY: 50 + Number(ambient.y || 0) * 180,
      ambientAngle: Number(ambient.angle || 0),
      ambientOpacity: clamp(Number(ambient.opacity || 0), 0, 0.28),
      ambientParticleX: Number(ambient.particleX || 0),
      ambientParticleY: Number(ambient.particleY || 0),
    };
  }

  function computeIdlePose(now, amplitude = 1) {
    const seconds = now / 1000;
    return {
      x: (Math.sin(seconds * 0.62) * 0.18 + Math.sin(seconds * 1.13 + 1.7) * 0.06) * amplitude,
      y: (Math.cos(seconds * 0.54 + 0.4) * 0.14 + Math.sin(seconds * 0.91) * 0.05) * amplitude,
      sparkle: 0.12 + (Math.sin(seconds * 1.8) + 1) * 0.05,
    };
  }

  function shouldUseMobilePerformanceMode() {
    return Boolean(mobilePerformanceQuery?.matches);
  }

  function getRenderFrameInterval() {
    return shouldUseMobilePerformanceMode() ? MOBILE_RENDER_FRAME_INTERVAL : DESKTOP_RENDER_FRAME_INTERVAL;
  }

  function syncPerformanceMode() {
    const isMobilePerformance = shouldUseMobilePerformanceMode();
    document.body.classList.toggle('is-mobile-performance', isMobilePerformance);
    viewer.classList.toggle('is-mobile-performance', isMobilePerformance);
  }

  function setCardPose(card, x, y, sparkle = 0, options = {}) {
    const surface = computeSurfaceLight(x, y, sparkle, options.ambient);
    const maxTilt = getMaxTiltDegrees();

    card.style.setProperty('--rx', `${(-surface.normalizedY * maxTilt).toFixed(2)}deg`);
    card.style.setProperty('--ry', `${(surface.normalizedX * maxTilt).toFixed(2)}deg`);
    card.style.setProperty('--light-x', `${surface.lightX.toFixed(2)}%`);
    card.style.setProperty('--light-y', `${surface.lightY.toFixed(2)}%`);
    card.style.setProperty('--curve-x', `${surface.curveX.toFixed(2)}%`);
    card.style.setProperty('--curve-y', `${surface.curveY.toFixed(2)}%`);
    card.style.setProperty('--shift-x', `${surface.shiftX.toFixed(2)}%`);
    card.style.setProperty('--shift-y', `${surface.shiftY.toFixed(2)}%`);
    card.style.setProperty('--angle', `${surface.angle.toFixed(2)}deg`);
    card.style.setProperty('--highlight-core', surface.highlightCore.toFixed(3));
    card.style.setProperty('--highlight-glow', surface.highlightGlow.toFixed(3));
    card.style.setProperty('--rim-opacity', surface.rimOpacity.toFixed(3));
    card.style.setProperty('--rim-x', `${(-surface.normalizedX * 10).toFixed(2)}px`);
    card.style.setProperty('--rim-y', `${(-surface.normalizedY * 10).toFixed(2)}px`);
    card.style.setProperty('--particle-x', `${surface.particleX.toFixed(2)}px`);
    card.style.setProperty('--particle-y', `${surface.particleY.toFixed(2)}px`);
    card.style.setProperty('--ambient-x', `${surface.ambientX.toFixed(2)}%`);
    card.style.setProperty('--ambient-y', `${surface.ambientY.toFixed(2)}%`);
    card.style.setProperty('--ambient-angle', `${surface.ambientAngle.toFixed(2)}deg`);
    card.style.setProperty('--ambient-opacity', surface.ambientOpacity.toFixed(3));
    card.style.setProperty('--ambient-particle-x', `${surface.ambientParticleX.toFixed(2)}px`);
    card.style.setProperty('--ambient-particle-y', `${surface.ambientParticleY.toFixed(2)}px`);
    card.style.setProperty('--sparkle-opacity', surface.sparkleOpacity.toFixed(3));
    return surface;
  }

  function pointerToCardTilt(event, element) {
    const rect = element.getBoundingClientRect();
    const x = ((event.clientX - rect.left) / rect.width - 0.5) * 2;
    const y = ((event.clientY - rect.top) / rect.height - 0.5) * 2;
    return { x: clamp(x, -1, 1), y: clamp(y, -1, 1) };
  }

  function handlePreviewPointerMove(event) {
    lastPreviewPointerAt = performance.now();
    const tilt = pointerToCardTilt(event, previewCard);
    setCardPose(previewCard, tilt.x, tilt.y, 0.18);
  }

  function handlePreviewPointerLeave() {
    lastPreviewPointerAt = performance.now() - 900;
  }

  function handleViewerPointerMove(event) {
    if (!active) return;

    const now = performance.now();
    const orientationRecentlyUpdated = now - lastOrientationAt < 900;
    if (orientationRecentlyUpdated) return;

    lastPointerAt = now;
    const tilt = pointerToCardTilt(event, viewerStage);
    target.x = tilt.x;
    target.y = tilt.y;
    target.sparkle = Math.max(target.sparkle, 0.2);
  }

  function handleOrientation(event) {
    if (!active || event.beta == null || event.gamma == null) return;

    orientationDetected = true;
    lastOrientationAt = performance.now();

    if (!baseline) {
      baseline = { beta: event.beta, gamma: event.gamma };
      setLiveMode('センサー操作中：現在角度を基準化しました');
      return;
    }

    const deltaGamma = event.gamma - baseline.gamma;
    const deltaBeta = event.beta - baseline.beta;
    target.x = clamp(deltaGamma / 34, -1, 1);
    target.y = clamp(deltaBeta / 34, -1, 1);
  }

  function handleMotion(event) {
    if (!active) return;

    const acceleration = event.accelerationIncludingGravity || event.acceleration || {};
    const rotation = event.rotationRate || {};
    const ax = Number(acceleration.x || 0);
    const ay = Number(acceleration.y || 0);
    const az = Number(acceleration.z || 0);
    const ra = Number(rotation.alpha || 0);
    const rb = Number(rotation.beta || 0);
    const rg = Number(rotation.gamma || 0);
    const accelerationMagnitude = Math.sqrt(ax * ax + ay * ay + az * az);
    const rotationMagnitude = Math.sqrt(ra * ra + rb * rb + rg * rg) / 140;
    const sparkle = clamp((accelerationMagnitude - 9.2) / 6 + rotationMagnitude, 0, 1);
    target.sparkle = Math.max(target.sparkle, sparkle);
  }

  function bindSensorsOnce() {
    if (sensorBound) return;
    sensorBound = true;
    window.addEventListener('deviceorientation', handleOrientation, { passive: true });
    window.addEventListener('devicemotion', handleMotion, { passive: true });
    viewerStage.addEventListener('pointermove', handleViewerPointerMove, { passive: true });
  }

  async function requestSensorAccess() {
    const permissionRequests = [];

    if (window.DeviceMotionEvent && typeof window.DeviceMotionEvent.requestPermission === 'function') {
      permissionRequests.push(window.DeviceMotionEvent.requestPermission().catch(() => 'denied'));
    }

    if (window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission === 'function') {
      permissionRequests.push(window.DeviceOrientationEvent.requestPermission().catch(() => 'denied'));
    }

    if (permissionRequests.length === 0) {
      return 'not-required';
    }

    const results = await Promise.all(permissionRequests);
    return results.every((result) => result === 'granted') ? 'granted' : 'denied';
  }

  async function enterFullscreen() {
    if (!viewer.requestFullscreen || document.fullscreenEnabled === false) {
      return 'not-supported';
    }

    try {
      await viewer.requestFullscreen({ navigationUI: 'hide' });
      return 'entered';
    } catch (error) {
      console.warn('Fullscreen request failed:', error);
      return 'failed';
    }
  }

  function startRenderLoop() {
    if (rafId) cancelAnimationFrame(rafId);
    let lastFrameAt = 0;

    const render = () => {
      if (!active) return;

      const now = performance.now();
      const frameInterval = getRenderFrameInterval();

      if (lastFrameAt && now - lastFrameAt < frameInterval) {
        rafId = requestAnimationFrame(render);
        return;
      }

      lastFrameAt = now;
      const ambientMotion = computeAmbientMotion(now, 1);

      current.x = lerp(current.x, target.x, 0.13);
      current.y = lerp(current.y, target.y, 0.13);
      current.sparkle = lerp(current.sparkle, target.sparkle, 0.18);
      target.sparkle *= 0.9;

      const surface = setCardPose(fullCard, current.x, current.y, current.sparkle, { ambient: ambientMotion });
      viewer.style.setProperty('--light-x', `${surface.lightX.toFixed(2)}%`);
      viewer.style.setProperty('--light-y', `${surface.lightY.toFixed(2)}%`);
      viewer.style.setProperty('--angle', `${surface.angle.toFixed(2)}deg`);

      rafId = requestAnimationFrame(render);
    };

    rafId = requestAnimationFrame(render);
  }

  function startPreviewIdleLoop() {
    if (previewRafId) cancelAnimationFrame(previewRafId);
    let lastFrameAt = 0;

    const render = () => {
      const now = performance.now();
      const frameInterval = getRenderFrameInterval();

      if (lastFrameAt && now - lastFrameAt < frameInterval) {
        previewRafId = requestAnimationFrame(render);
        return;
      }

      lastFrameAt = now;
      const pointerRecentlyUpdated = now - lastPreviewPointerAt < 1100;

      if (!pointerRecentlyUpdated && !active) {
        const rawIdlePose = computeIdlePose(now, 0.72);
        previewIdleCurrent.x = lerp(previewIdleCurrent.x, rawIdlePose.x, 0.08);
        previewIdleCurrent.y = lerp(previewIdleCurrent.y, rawIdlePose.y, 0.08);
        previewIdleCurrent.sparkle = lerp(previewIdleCurrent.sparkle, rawIdlePose.sparkle, 0.12);
        const idlePose = previewIdleCurrent;
        setCardPose(previewCard, idlePose.x, idlePose.y, idlePose.sparkle);
      }

      previewRafId = requestAnimationFrame(render);
    };

    previewRafId = requestAnimationFrame(render);
  }

  function resetMotionState() {
    baseline = null;
    orientationDetected = false;
    lastOrientationAt = 0;
    lastPointerAt = performance.now();
    target.x = 0;
    target.y = 0;
    target.sparkle = 0;
    current.x = 0;
    current.y = 0;
    current.sparkle = 0;
    setCardPose(fullCard, 0, 0, 0);
  }

  async function startViewer() {
    applyEffect(effectSelect.value);
    applyFit(fitSelect.value);
    applyStrength();
    updateTiltLabel();
    resetMotionState();
    syncFullscreenFit();
    syncPerformanceMode();

    viewer.hidden = false;
    viewer.setAttribute('aria-hidden', 'false');
    document.body.classList.add('viewer-open');
    active = true;
    setLiveMode('権限を確認中');

    const sensorPromise = requestSensorAccess();
    const fullscreenPromise = enterFullscreen();

    bindSensorsOnce();
    startRenderLoop();

    const [sensorResult, fullscreenResult] = await Promise.all([sensorPromise, fullscreenPromise]);

    if (!active) return;

    if (sensorResult === 'denied') {
      setLiveMode('センサー拒否：タッチ / マウス操作に切替');
    } else if (sensorResult === 'granted') {
      setLiveMode('センサー許可済み：端末を傾けて操作');
    } else {
      setLiveMode('センサー待機中：端末を傾けてください');
    }

    if (fullscreenResult === 'failed' || fullscreenResult === 'not-supported') {
      setStatus('全画面化できない環境では、画面全体に近い固定ビューで表示します。センサーが使えない場合はタッチ操作で光が動きます。');
    } else {
      setStatus('全画面表示中です。閉じる、Esc、またはブラウザの全画面解除操作で終了できます。');
    }

    window.setTimeout(() => {
      if (!active) return;
      if (!orientationDetected && sensorResult !== 'denied') {
        setLiveMode('センサー未検出：タッチ / マウスでも操作可能');
      }
    }, 1800);
  }

  async function closeViewer({ fromFullscreenChange = false } = {}) {
    if (!active && viewer.hidden) return;

    active = false;
    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = 0;
    }

    viewer.hidden = true;
    viewer.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('viewer-open');
    setCardPose(fullCard, 0, 0, 0);
    setLiveMode('待機中');

    if (!fromFullscreenChange && document.fullscreenElement && !fullscreenCloseInProgress) {
      fullscreenCloseInProgress = true;
      try {
        await document.exitFullscreen();
      } catch (error) {
        console.warn('Fullscreen exit failed:', error);
      } finally {
        fullscreenCloseInProgress = false;
      }
    }
  }

  imageInput.addEventListener('change', (event) => {
    loadFile(event.target.files && event.target.files[0]);
  });

  ['dragenter', 'dragover'].forEach((eventName) => {
    dropZone.addEventListener(eventName, (event) => {
      event.preventDefault();
      dropZone.classList.add('is-dragover');
    });
  });

  ['dragleave', 'drop'].forEach((eventName) => {
    dropZone.addEventListener(eventName, (event) => {
      event.preventDefault();
      dropZone.classList.remove('is-dragover');
    });
  });

  dropZone.addEventListener('drop', (event) => {
    const file = event.dataTransfer.files && event.dataTransfer.files[0];
    loadFile(file);
  });

  effectSelect.addEventListener('change', () => applyEffect(effectSelect.value));
  fitSelect.addEventListener('change', () => applyFit(fitSelect.value));
  strengthRange.addEventListener('input', applyStrength);
  tiltRange.addEventListener('input', () => {
    updateTiltLabel();
    setCardPose(previewCard, 0, 0, 0);
  });

  previewCard.addEventListener('pointermove', handlePreviewPointerMove, { passive: true });
  previewCard.addEventListener('pointerleave', handlePreviewPointerLeave, { passive: true });
  images.forEach((image) => {
    image.addEventListener('load', () => syncImageLayoutFromImage(image));
  });

  startButton.addEventListener('click', startViewer);
  resetButton.addEventListener('click', resetToSample);
  exitButton.addEventListener('click', () => closeViewer());
  recalibrateButton.addEventListener('click', () => {
    baseline = null;
    target.x = 0;
    target.y = 0;
    setLiveMode('現在角度を再基準化します');
  });

  document.addEventListener('fullscreenchange', () => {
    if (active && !document.fullscreenElement && !fullscreenCloseInProgress) {
      closeViewer({ fromFullscreenChange: true });
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && active) {
      closeViewer();
    }
  });

  window.addEventListener('resize', syncFullscreenFit, { passive: true });
  window.visualViewport?.addEventListener('resize', syncFullscreenFit, { passive: true });

  if (mobilePerformanceQuery) {
    if (typeof mobilePerformanceQuery.addEventListener === 'function') {
      mobilePerformanceQuery.addEventListener('change', syncPerformanceMode);
    } else if (typeof mobilePerformanceQuery.addListener === 'function') {
      mobilePerformanceQuery.addListener(syncPerformanceMode);
    }
  }

  window.addEventListener('pagehide', () => {
    if (previewRafId) cancelAnimationFrame(previewRafId);
    revokeCurrentObjectUrl();
  });

  loadImageUrl(sampleUrl);
  applyEffect(effectSelect.value);
  applyFit(fitSelect.value);
  applyStrength();
  updateTiltLabel();
  syncPerformanceMode();
  setCardPose(previewCard, 0, 0, 0);
  syncFullscreenFit();
  startPreviewIdleLoop();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((error) => {
        console.warn('Service worker registration failed:', error);
      });
    });
  }
})();
  </script>
</body>
</html>
